<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skinora | Your Personalized Report</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(to bottom,#fff0f5,#fde4ec);
  margin:0;
}
header{
  background:linear-gradient(to right,#f8bbd0,#f48fb1);
  padding:40px;
  text-align:center;
  color:white;
}
.container{
  max-width:1000px;
  margin:30px auto;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
}
.card{
  background:#fce4ec;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}
.product{
  background:#fff;
  border-radius:14px;
  padding:20px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  font-weight:600;
}
.buttons{
  display:flex;
  justify-content:space-between;
  margin-top:40px;
}
button{
  background:#d81b60;
  color:white;
  padding:14px 35px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
}
button.secondary{
  background:#f3b2c8;
  color:#6a1b4d;
}
button:hover{ opacity:0.9; }
</style>
</head>

<body>

<header>
  <h1>Skinora Personalized Report</h1>
  <p>Based on Your Skin & Hair Analysis</p>
</header>

<div class="container" id="output"></div>

<script>
const data = JSON.parse(localStorage.getItem("skinoraData"));

if(!data){
  document.getElementById("output").innerHTML = "No Data Found";
}else{

let products = [];
let tips = [];

/* ---------- SKIN TYPE LOGIC ---------- */
const skinTypeLogic = {
  Dry: {
    products: [
      "Hydrating Cleanser",
      "Hyaluronic Acid Serum",
      "Ceramide Moisturizer"
    ],
    tips: ["Avoid harsh cleansers","Use rich moisturizers"]
  },
  Oily: {
    products: [
      "Gel Cleanser",
      "Niacinamide Serum",
      "Oil-Free Moisturizer"
    ],
    tips: ["Avoid heavy creams","Clean twice daily"]
  },
  Combination: {
    products: [
      "Mild Cleanser",
      "Niacinamide Serum",
      "Light Moisturizer"
    ],
    tips: ["Balance T-zone & dry areas"]
  },
  Sensitive: {
    products: [
      "Gentle Cleanser",
      "Soothing Gel",
      "Barrier Repair Cream"
    ],
    tips: ["Avoid fragrance","Always patch test"]
  }
};

/* ---------- PROBLEM LOGIC ---------- */
const problemLogic = {
  Acne: {
    products: [
      "Salicylic Acid Cleanser",
      "Spot Treatment Gel"
    ],
    tips: ["Do not pop pimples"]
  },
  Pigmentation: {
    products: [
      "Vitamin C Serum",
      "Sunscreen SPF 50"
    ],
    tips: ["Never skip sunscreen"]
  },
  "Dark Spots": {
    products: ["Alpha Arbutin Serum"],
    tips: ["Be patient – results take time"]
  },
  "Dull Skin": {
    products: ["Vitamin C Serum"],
    tips: ["Exfoliate once a week"]
  },
  "Fine Lines": {
    products: [
      "Beginner Retinol",
      "Peptide Cream"
    ],
    tips: ["Use retinol only at night"]
  },
  "Hair Fall": {
    products: [
      "Hair Growth Serum",
      "Caffeine Shampoo"
    ],
    tips: ["Oil massage weekly"]
  },
  Dandruff: {
    products: ["Anti-Dandruff Shampoo"],
    tips: ["Do not scratch scalp"]
  },
  "Dry Scalp": {
    products: ["Nourishing Hair Oil"],
    tips: ["Oil before hair wash"]
  },
  "Sensitive Skin": {
    products: ["Fragrance-Free Products"],
    tips: ["Avoid active ingredients"]
  }
};

/* ---------- APPLY LOGIC ---------- */
products.push(...skinTypeLogic[data.skinType].products);
tips.push(...skinTypeLogic[data.skinType].tips);

data.problems.forEach(p=>{
  if(problemLogic[p]){
    products.push(...problemLogic[p].products);
    tips.push(...problemLogic[p].tips);
  }
});

/* ---------- REMOVE DUPLICATES ---------- */
products = [...new Set(products)];
tips = [...new Set(tips)];

/* ---------- OUTPUT ---------- */
document.getElementById("output").innerHTML = `
<h2>Hello ${data.name} 👋</h2>

<div class="card">
  <p><b>Skin Type:</b> ${data.skinType}</p>
  <p><b>Main Issues:</b> ${data.problems.join(", ") || "None"}</p>
</div>

<h2>🧴 Products Recommended For You</h2>
<div class="products">
${products.map(p=>`
  <div class="product">${p}</div>
`).join("")}
</div>

<h2>✨ Smart Care Tips</h2>
<ul>
${tips.map(t=>`<li>${t}</li>`).join("")}
</ul>

<div class="buttons">
  <button class="secondary" onclick="goBack()">← Back to Quiz</button>
  <button onclick="goRoutine()">Get My Routine →</button>
</div>
`;
}

function goRoutine(){
  window.location.href="routine.html";
}
function goBack(){
  window.location.href="quiz.html";
}
</script>

</body>
</html>
