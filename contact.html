<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skinora | Contact Us</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(to bottom,#fff0f5,#fde4ec);
  margin:0;
}
header{
  background:linear-gradient(to right,#f8bbd0,#f48fb1);
  padding:40px;
  text-align:center;
  color:white;
}
.container{
  max-width:800px;
  margin:40px auto;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  text-align:center;
}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}
.card{
  background:#fce4ec;
  padding:25px;
  border-radius:15px;
}
.card img{
  width:60px;
  margin-bottom:10px;
}
.card h3{
  margin:10px 0 5px;
  color:#ad1457;
}
button{
  margin-top:35px;
  background:#d81b60;
  color:white;
  padding:14px 35px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
}
button:hover{ opacity:0.9; }
</style>
</head>

<body>

<header>
  <h1>Contact Skinora</h1>
  <p>We’re here to help you 💖</p>
</header>

<div class="container">

  <p>
    Have questions about your skin or hair routine?  
    Feel free to contact us anytime.
  </p>

  <div class="cards">

    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" alt="Phone">
      <h3>Phone</h3>
      <p><strong>+91 9172950905</strong></p>
    </div>

    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email">
      <h3>Email</h3>
      <p><strong>skinora@cosmeticare.com</strong></p>
    </div>

    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" alt="Location">
      <h3>Location</h3>
      <p>India</p>
    </div>

  </div>

  <button onclick="goHome()">← Back to Home</button>

</div>

<script>
function goHome(){
  window.location.href="index.html";
}
</script>

</body>
</html>
